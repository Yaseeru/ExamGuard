[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
     "echo 'Installing backend dependencies...' && cd backend && npm ci --production && cd ..",
     "echo 'Installing frontend dependencies...' && cd frontend && npm ci && cd ..",
     "echo 'Building frontend...' && cd frontend && npm run build && cd ..",
     "echo 'Verifying build...' && ls -la frontend/dist && ls -la frontend/dist/index.html"
]

[start]
cmd = "cd backend && node server.js"

[variables]
NODE_ENV = "production"
