[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
     "cd backend && npm ci --omit=dev",
     "cd frontend && NODE_ENV=development npm ci",
     "cd frontend && npm run build",
     "ls -la frontend/dist"
]

[start]
cmd = "cd backend && node server.js"

[variables]
NODE_ENV = "production"
